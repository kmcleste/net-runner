services:
  # ── World simulator ────────────────────────────────────────────────────────
  - type: web
    name: net-runner-simulator
    env: docker
    dockerfilePath: ./Dockerfile.combined
    startCommand: uvicorn net_runner.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /world
    plan: free

  # ── Remediation engine ─────────────────────────────────────────────────────
  - type: web
    name: net-runner-remediation
    env: docker
    dockerfilePath: ./Dockerfile.combined
    startCommand: uvicorn remediation.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: SIMULATOR_URL
        sync: false          # paste simulator URL here after first deploy
      - key: ANTHROPIC_API_KEY
        sync: false          # optional — enables LLM agent

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: net-runner-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # paste simulator URL here after first deploy
      - key: VITE_WS_URL
        sync: false          # wss://<simulator-url>/ws
      - key: VITE_REMEDIATION_URL
        sync: false          # paste remediation URL here after first deploy
