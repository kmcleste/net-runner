# railway.toml — defines both services in one repo.
# Each Railway service reads this file and uses the section matching its
# $RAILWAY_SERVICE_NAME environment variable (set automatically by Railway).
#
# Services to create in the Railway dashboard:
#   1. "simulator"    → connects to this repo, Railway picks up [services.simulator]
#   2. "remediation"  → connects to same repo, picks up [services.remediation]

[services.simulator]
dockerfile = "Dockerfile"
healthcheckPath = "/world"
healthcheckTimeout = 30

[services.remediation]
dockerfile = "Dockerfile.remediation"
healthcheckPath = "/health"
healthcheckTimeout = 30
