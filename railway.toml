# railway.toml — shared config for both Railway services in this project.
#
# Both services point at the same GitHub repo and build from Dockerfile.combined.
# RAILWAY_SERVICE_NAME (injected automatically by Railway) selects which process runs.
#
# Service names to use in the Railway dashboard:
#   "simulator"   → runs the net-runner world sim on the injected $PORT
#   "remediation" → runs the remediation engine on the injected $PORT

[build]
dockerfilePath = "Dockerfile.combined"

[deploy]
startCommand = """sh -c '
if [ "$RAILWAY_SERVICE_NAME" = "remediation" ]; then
  exec uvicorn remediation.main:app --host 0.0.0.0 --port ${PORT:-9000}
else
  exec uvicorn net_runner.api.app:app --host 0.0.0.0 --port ${PORT:-8000}
fi'"""
