<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e15" />
    <title>net-runner — IT Infra Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e15;
        --grid: rgba(120, 150, 190, 0.045);
        --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
        --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        color: #e7edf4;
        font-family: var(--font-sans);
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg);
        /* faint blueprint grid + a soft cyan glow at the top, like an ops room */
        background-image:
          radial-gradient(ellipse 120% 70% at 50% -10%, rgba(63, 208, 221, 0.06), transparent 60%),
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 100% 100%, 34px 34px, 34px 34px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #root { height: 100vh; display: flex; flex-direction: column; }

      /* Tabular figures for telemetry so numbers don't jitter as they tick */
      .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

      /* Status LED pulse — used on active failures */
      .led-pulse { animation: led-breathe 1.6s ease-in-out infinite; }
      @keyframes led-breathe {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.45; transform: scale(0.82); }
      }

      /* Quiet, on-brand scrollbars */
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #25303f;
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: #324053; background-clip: padding-box; }
      * { scrollbar-width: thin; scrollbar-color: #25303f transparent; }

      /* Inputs/selects pick up the brand font + a focus ring */
      select, input, button { font-family: var(--font-sans); }
      select:focus-visible, input:focus-visible, button:focus-visible {
        outline: 2px solid rgba(63, 208, 221, 0.6);
        outline-offset: 1px;
      }
      select option { background: #0f1520; color: #e7edf4; }

      @media (prefers-reduced-motion: reduce) {
        .led-pulse { animation: none; }
        * { transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
